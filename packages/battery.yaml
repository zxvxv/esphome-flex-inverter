# --- POCZĄTEK PLIKU BATTERY ---
# Wersja v1.03 - Konfiguracja baterii dla Hackman Flex3L.
# Zmiany: Usunięto przedrostki "hackman_flex3l_" ze wszystkich identyfikatorów "id:". Dodano "id: battery_soc".

sensor:
  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Daily Battery Charge"
    id: daily_battery_charge
    register_type: holding
    address: 614
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: "total_increasing"
    accuracy_decimals: 1
    filters:
      - multiply: 0.1
    value_type: U_WORD
    icon: "mdi:battery-charging"

  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Daily Battery Discharge"
    id: daily_battery_discharge
    register_type: holding
    address: 615
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: "total_increasing"
    accuracy_decimals: 1
    filters:
      - multiply: 0.1
    value_type: U_WORD
    icon: "mdi:battery-minus"

  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Total Battery Charge"
    id: total_battery_charge
    register_type: holding
    address: 616
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: "total_increasing"
    accuracy_decimals: 1
    value_type: U_DWORD_R
    filters:
      - multiply: 0.1
    icon: "mdi:battery-charging-100"

  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Total Battery Discharge"
    id: total_battery_discharge
    register_type: holding
    address: 618
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: "total_increasing"
    accuracy_decimals: 1
    value_type: U_DWORD_R
    filters:
      - multiply: 0.1
    icon: "mdi:battery-arrow-down"

  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Battery Temperature"
    register_type: holding
    address: 686
    unit_of_measurement: "°C"
    device_class: temperature
    accuracy_decimals: 0
    value_type: S_WORD
    filters:
      - offset: -1000
      - multiply: 0.1
    icon: "mdi:thermometer"

  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Battery Voltage"
    id: battery_voltage
    register_type: holding
    address: 687
    unit_of_measurement: "V"
    device_class: voltage
    accuracy_decimals: 2
    filters:
      - multiply: 0.01
    value_type: U_WORD
    icon: "mdi:flash"

  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Battery SOC"
    id: battery_soc
    register_type: holding
    address: 688
    unit_of_measurement: "%"
    device_class: battery
    accuracy_decimals: 0
    value_type: U_WORD
    icon: "mdi:battery"

  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Battery 2 SOC"
    register_type: holding
    address: 689
    unit_of_measurement: "%"
    device_class: battery
    accuracy_decimals: 0
    value_type: U_WORD
    disabled_by_default: true
    icon: "mdi:battery-outline"

  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Battery Power"
    id: battery_power
    register_type: holding
    address: 690
    unit_of_measurement: "W"
    device_class: power
    state_class: "measurement"
    accuracy_decimals: 0
    value_type: S_WORD
    icon: "mdi:lightning-bolt"

  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Battery Current"
    register_type: holding
    address: 691
    unit_of_measurement: "A"
    device_class: current
    accuracy_decimals: 2
    filters:
      - multiply: 0.01
    value_type: S_WORD
    icon: "mdi:current-dc"

  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Battery Corrected Capacity"
    id: battery_corrected_capacity
    register_type: holding
    address: 692
    unit_of_measurement: "Ah"
    accuracy_decimals: 0
    value_type: U_WORD
    icon: "mdi:battery"

  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Battery BMS Charging Voltage"
    id: battery_bms_charging_voltage
    register_type: holding
    address: 310
    unit_of_measurement: "V"
    device_class: voltage
    accuracy_decimals: 2
    filters:
      - multiply: 0.01
    value_type: U_WORD
    icon: "mdi:flash-triangle"

  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Battery BMS Discharging Voltage"
    id: battery_bms_discharging_voltage
    register_type: holding
    address: 311
    unit_of_measurement: "V"
    device_class: voltage
    accuracy_decimals: 2
    filters:
      - multiply: 0.01
    value_type: U_WORD
    icon: "mdi:flash-triangle-outline"

  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Battery BMS Charging Current"
    register_type: holding
    address: 312
    unit_of_measurement: "A"
    device_class: current
    accuracy_decimals: 0
    value_type: U_WORD
    icon: "mdi:current-dc"

  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Battery BMS Discharging Current"
    register_type: holding
    address: 313
    unit_of_measurement: "A"
    device_class: current
    accuracy_decimals: 0
    value_type: U_WORD
    icon: "mdi:current-dc"

  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Battery BMS SOC"
    register_type: holding
    address: 314
    unit_of_measurement: "%"
    accuracy_decimals: 0
    value_type: U_WORD
    icon: "mdi:battery"

  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Battery BMS Voltage"
    id: battery_bms_voltage
    register_type: holding
    address: 315
    unit_of_measurement: "V"
    device_class: voltage
    accuracy_decimals: 2
    filters:
      - multiply: 0.01
    value_type: U_WORD
    icon: "mdi:sine-wave"

  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Battery BMS Current"
    register_type: holding
    address: 316
    unit_of_measurement: "A"
    device_class: current
    accuracy_decimals: 0
    value_type: S_WORD
    icon: "mdi:current-dc"

  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Battery BMS Max Charging Current"
    register_type: holding
    address: 318
    unit_of_measurement: "A"
    device_class: current
    accuracy_decimals: 0
    value_type: U_WORD
    icon: "mdi:current-dc"

  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Battery BMS Max Discharging Current"
    register_type: holding
    address: 319
    unit_of_measurement: "A"
    device_class: current
    accuracy_decimals: 0
    value_type: U_WORD
    icon: "mdi:current-dc"

  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Battery BMS Other Symbol"
    register_type: holding
    address: 322
    accuracy_decimals: 0
    value_type: U_WORD
    icon: "mdi:battery-unknown"

  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Battery 2 Voltage"
    id: battery_2_voltage
    register_type: holding
    address: 693
    unit_of_measurement: "V"
    device_class: voltage
    accuracy_decimals: 2
    filters:
      - multiply: 0.01
    value_type: U_WORD
    disabled_by_default: true
    icon: "mdi:flash-outline"

  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Battery 2 Current"
    register_type: holding
    address: 694
    unit_of_measurement: "A"
    device_class: current
    accuracy_decimals: 2
    filters:
      - multiply: 0.01
    value_type: S_WORD
    disabled_by_default: true
    icon: "mdi:current-dc"

  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Battery 2 Power"
    id: battery_2_power
    register_type: holding
    address: 695
    unit_of_measurement: "W"
    device_class: power
    state_class: "measurement"
    accuracy_decimals: 0
    value_type: S_WORD
