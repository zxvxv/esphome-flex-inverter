    name: "Hackman Flex3L Battery BMS SOC"
    register_type: holding
    address: 314
    unit_of_measurement: "%"
    accuracy_decimals: 0
    value_type: U_WORD
    icon: "mdi:battery"

  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Hackman Flex3L Battery BMS Voltage"
    id: hackman_flex3l_battery_bms_voltage
    register_type: holding
    address: 315
    unit_of_measurement: "V"
    device_class: voltage
