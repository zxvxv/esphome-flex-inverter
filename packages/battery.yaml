# --- POCZĄTEK PLIKU BATTERY ---
# Wersja v1.00 - Inicjalizacja konfiguracji baterii dla Hackman Flex3L.
# Plik zawiera sensory, przełączniki i kontrolki do zarządzania magazynem energii.

sensor:
  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Hackman Flex3L Daily Battery Charge"
    id: hackman_flex3l_daily_battery_charge
    register_type: holding
    address: 614
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: "total_increasing"
    accuracy_decimals: 1
    filters:
      - multiply: 0.1
    value_type: U_WORD
    icon: "mdi:battery-charging"

  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Hackman Flex3L Daily Battery Discharge"
    id: hackman_flex3l_daily_battery_discharge
    register_type: holding
    address: 615
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: "total_increasing"
    accuracy_decimals: 1
    filters:
      - multiply: 0.1
    value_type: U_WORD
    icon: "mdi:battery-minus"

  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Hackman Flex3L Total Battery Charge"
    id: hackman_flex3l_total_battery_charge
    register_type: holding
    address: 616
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: "total_increasing"
    accuracy_decimals: 1
    value_type: U_DWORD_R
    filters:
      - multiply: 0.1
    icon: "mdi:battery-charging-100"

  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Hackman Flex3L Total Battery Discharge"
    id: hackman_flex3l_total_battery_discharge
    register_type: holding
    address: 618
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: "total_increasing"
    accuracy_decimals: 1
    value_type: U_DWORD_R
    filters:
      - multiply: 0.1
    icon: "mdi:battery-arrow-down"

  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Hackman Flex3L Battery Temperature"
    register_type: holding
    address: 686
    unit_of_measurement: "°C"
    device_class: temperature
    accuracy_decimals: 0
    value_type: S_WORD
    filters:
      - offset: -1000
      - multiply: 0.1
    icon: "mdi:thermometer"

  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Hackman Flex3L Battery Voltage"
    id: hackman_flex3l_battery_voltage
    register_type: holding
    address: 687
    unit_of_measurement: "V"
    device_class: voltage
    accuracy_decimals: 2
    filters:
      - multiply: 0.01
    value_type: U_WORD
    icon: "mdi:flash"

  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Hackman Flex3L Battery SOC"
    register_type: holding
    address: 688
    unit_of_measurement: "%"
    device_class: battery
    accuracy_decimals: 0
    value_type: U_WORD
    icon: "mdi:battery"

  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Hackman Flex3L Battery 2 SOC"
    register_type: holding
    address: 689
    unit_of_measurement: "%"
    device_class: battery
    accuracy_decimals: 0
    value_type: U_WORD
    disabled_by_default: true
    icon: "mdi:battery-outline"

  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Hackman Flex3L Battery Power"
    id: hackman_flex3l_battery_power
    register_type: holding
    address: 690
    unit_of_measurement: "W"
    device_class: power
    state_class: "measurement"
    accuracy_decimals: 0
    value_type: S_WORD
    icon: "mdi:lightning-bolt"

  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Hackman Flex3L Battery Current"
    register_type: holding
    address: 691
    unit_of_measurement: "A"
    device_class: current
    accuracy_decimals: 2
    filters:
      - multiply: 0.01
    value_type: S_WORD
    icon: "mdi:current-dc"

  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Hackman Flex3L Battery Corrected Capacity"
    id: hackman_flex3l_battery_corrected_capacity
    register_type: holding
    address: 692
    unit_of_measurement: "Ah"
    accuracy_decimals: 0
    value_type: U_WORD
    icon: "mdi:battery"

  - platform: modbus_controller
