# --- POCZĄTEK PLIKU LOAD ---
# Wersja v1.01 - Konfiguracja obciążenia domowego dla Hackman Flex3L.
# Zmiany: Usunięto przedrostki "Hackman Flex3L" z nazw wyświetlanych (name).

sensor:
  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Load L1 Voltage"
    register_type: holding
    address: 744
    unit_of_measurement: "V"
    device_class: voltage
    accuracy_decimals: 1
    filters:
      - multiply: 0.1
    value_type: U_WORD
    icon: "mdi:sine-wave"

  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Load L2 Voltage"
    register_type: holding
    address: 745
    unit_of_measurement: "V"
    device_class: voltage
    accuracy_decimals: 1
    filters:
      - multiply: 0.1
    value_type: U_WORD
    icon: "mdi:sine-wave"

  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Load L3 Voltage"
    register_type: holding
    address: 746
    unit_of_measurement: "V"
    device_class: voltage
    accuracy_decimals: 1
    filters:
      - multiply: 0.1
    value_type: U_WORD
    icon: "mdi:sine-wave"

  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Load L1 Power"
    register_type: holding
    address: 750
    unit_of_measurement: "W"
    device_class: power
    state_class: "measurement"
    accuracy_decimals: 0
    value_type: S_WORD
    icon: "mdi:home-lightning-bolt"

  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Load L2 Power"
    register_type: holding
    address: 751
    unit_of_measurement: "W"
    device_class: power
    state_class: "measurement"
    accuracy_decimals: 0
    value_type: S_WORD
    icon: "mdi:home-lightning-bolt"

  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Load L3 Power"
    register_type: holding
    address: 752
    unit_of_measurement: "W"
    device_class: power
    state_class: "measurement"
    accuracy_decimals: 0
    value_type: S_WORD
    icon: "mdi:home-lightning-bolt"

  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Load Power"
    register_type: holding
    address: 753
    unit_of_measurement: "W"
    device_class: power
    state_class: "measurement"
    accuracy_decimals: 0
    value_type: S_WORD
    icon: "mdi:home-lightning-bolt"

  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Load Frequency"
    register_type: holding
    address: 755
    unit_of_measurement: "Hz"
    device_class: frequency
    accuracy_decimals: 2
    filters:
      - multiply: 0.01
    value_type: U_WORD
    icon: "mdi:sine-wave"

  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Daily Load Consumption"
    id: hackman_flex3l_daily_load_consumption
    register_type: holding
    address: 626
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: "total_increasing"
    accuracy_decimals: 1
    value_type: U_WORD
    filters:
      - multiply: 0.1
    icon: "mdi:home-lightning-bolt"

  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Total Consumption"
    id: hackman_flex3l_total_consumption
    register_type: holding
    address: 627
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: "total_increasing"
    accuracy_decimals: 1
    value_type: U_DWORD_R
    filters:
      - multiply: 0.1
    icon: "mdi:home-lightning-bolt"

  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Load UPS L1 Power"
    register_type: holding
    address: 740
    unit_of_measurement: "W"
    device_class: power
    state_class: "measurement"
    accuracy_decimals: 0
    value_type: S_WORD
    icon: "mdi:home-lightning-bolt"
    disabled_by_default: true

  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Load UPS L2 Power"
    register_type: holding
    address: 741
    unit_of_measurement: "W"
    device_class: power
    state_class: "measurement"
    accuracy_decimals: 0
    value_type: S_WORD
    icon: "mdi:home-lightning-bolt"
    disabled_by_default: true

  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Load UPS L3 Power"
    register_type: holding
    address: 742
    unit_of_measurement: "W"
    device_class: power
    state_class: "measurement"
    accuracy_decimals: 0
    value_type: S_WORD
    icon: "mdi:home-lightning-bolt"
    disabled_by_default: true

  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Load UPS Power"
    register_type: holding
    address: 743
    unit_of_measurement: "W"
    device_class: power
    state_class: "measurement"
    accuracy_decimals: 0
    value_type: S_WORD
    icon: "mdi:home-lightning-bolt"
    disabled_by_default: true

  - platform: template
    name: "Power Losses"
    id: hackman_flex3l_power_losses
    unit_of_measurement: "W"
    device_class: power
    state_class: "measurement"
    accuracy_decimals: 1
    lambda: |-
      return (
        id(hackman_flex3l_pv1_power).state +
        id(hackman_flex3l_pv2_power).state +
        (id(hackman_flex3l_pv3_power).state) +
        (id(hackman_flex3l_pv4_power).state) +
        id(hackman_flex3l_battery_power).state -
        id(hackman_flex3l_generator_power_total).state -
        id(hackman_flex3l_output_power).state
      );
    icon: "mdi:home-lightning-bolt"

  - platform: template
    name: "Daily Losses"
    id: hackman_flex3l_daily_losses
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: total_increasing
    accuracy_decimals: 1
    lambda: |-
      return (
        id(hackman_flex3l_daily_energy_bought).state +
        id(hackman_flex3l_daily_pv_production).state +
        id(hackman_flex3l_daily_generator_production).state +
        id(hackman_flex3l_daily_battery_discharge).state -
        id(hackman_flex3l_daily_energy_sold).state -
        id(hackman_flex3l_daily_battery_charge).state -
        id(hackman_flex3l_daily_load_consumption).state
      );
    icon: "mdi:home-lightning-bolt"

  - platform: template
    name: "Total Losses"
    id: hackman_flex3l_total_losses
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: total_increasing
    accuracy_decimals: 1
    lambda: |-
      return (
        id(hackman_flex3l_total_energy_bought).state +
        id(hackman_flex3l_total_pv_production).state +
        id(hackman_flex3l_total_generator_production).state +
        id(hackman_flex3l_total_battery_discharge).state -
        id(hackman_flex3l_total_energy_sold).state -
        id(hackman_flex3l_total_battery_charge).state -
        id(hackman_flex3l_total_consumption).state
      );
    icon: "mdi:home-lightning-bolt"

binary_sensor:
  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "AC Load Relay Reserved"
    register_type: holding
    address: 652
    bitmask: 0x2
    icon: "mdi:toggle-switch-variant"
# --- KONIEC PLIKU LOAD ---
