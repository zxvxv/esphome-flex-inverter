# --- POCZĄTEK PLIKU WORK MODE ---
# Wersja v1.00 - Inicjalizacja głównych trybów pracy dla Hackman Flex3L.
# Plik zawiera konfigurację priorytetów energii, trybów Zero Export/Selling oraz limity mocy.

select:
  - platform: modbus_controller
    id: hackman_flex3l_energy_management_priority
    use_write_multiple: true
    modbus_controller_id: ${modbus_controller_id}
    name: "Hackman Flex3L Energy Management Priority"
    address: 241
    value_type: U_WORD
    icon: "mdi:priority-high"
    optionsmap:
      "Battery First": 0
      "Load First": 1

  - platform: modbus_controller
    use_write_multiple: true
    modbus_controller_id: ${modbus_controller_id}
    id: hackman_flex3l_system_work_mode
    name: "Hackman Flex3L System Work Mode"
    address: 242
    value_type: U_WORD
    icon: "mdi:cog"
    optionsmap:
      "Selling First": 0
      "Zero Export To Load": 1
      "Zero Export To CT": 2

switch:
  - platform: modbus_controller
    use_write_multiple: true
    modbus_controller_id: ${modbus_controller_id}
    register_type: holding
    name: "Hackman Flex3L Load Priority"
    bitmask: 1
    address: 241
    icon: "mdi:priority-high"

  - platform: modbus_controller
    use_write_multiple: true
    modbus_controller_id: ${modbus_controller_id}
    name: "Hackman Flex3L Solar Sell"
    id: hackman_flex3l_switch_solar_sell
    register_type: holding
    address: 245
    bitmask: 1
    icon: "mdi:toggle-switch"

  - platform: modbus_controller
    use_write_multiple: true
    modbus_controller_id: ${modbus_controller_id}
    name: "Hackman Flex3L Grid Peak Shaving Enable"
    register_type: holding
    address: 278
    bitmask: 0x0010 # bit 4
    icon: "mdi:transmission-tower"

number:
  - platform: modbus_controller
    use_write_multiple: true
    modbus_controller_id: ${modbus_controller_id}
    id: hackman_flex3l_max_sell_power
    name: "Hackman Flex3L Max Sell Power"
    unit_of_measurement: W
    device_class: power
    min_value: 0
    step: 1
    address: 243
    value_type: U_WORD
    mode: box
    icon: "mdi:cash-multiple"

  - platform: modbus_controller
    use_write_multiple: true
    modbus_controller_id: ${modbus_controller_id}
    name: "Hackman Flex3L Max Solar Power"
    id: hackman_flex3l_max_solar_power
    unit_of_measurement: W
    device_class: power
    min_value: 0
    step: 1
    address: 440
    value_type: U_WORD
    mode: box
    icon: "mdi:solar-power"

  - platform: modbus_controller
    use_write_multiple: true
    modbus_controller_id: ${modbus_controller_id}
    name: "Hackman Flex3L Zero Export Power"
    id: hackman_flex3l_zero_export_power
    address: 204
    unit_of_measurement: "W"
    device_class: power
    value_type: U_WORD
    min_value: 20
    max_value: 500
    step: 1
    mode: box
    icon: "mdi:transmission-tower-import"

  - platform: modbus_controller
    use_write_multiple: true
    modbus_controller_id: ${modbus_controller_id}
    name: "Hackman Flex3L Grid Peak Shaving Power"
    id: hackman_flex3l_grid_peak_shaving_power
    register_type: holding
    address: 291
    unit_of_measurement: "W"
    device_class: power
    value_type: U_WORD
    min_value: 0
    step: 1
    mode: box
    icon: "mdi:transmission-tower"
# --- KONIEC PLIKU WORK MODE ---
