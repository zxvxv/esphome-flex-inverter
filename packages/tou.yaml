# --- POCZĄTEK PLIKU TOU ---
# Wersja v1.00 - Inicjalizacja konfiguracji Time of Use (harmonogramu pracy) dla Hackman Flex3L.
# Plik zawiera sensory i logikę sterującą okienkami czasowymi (ładowanie/rozładowywanie).

substitutions:
  func_int_to_time: |-
    uint8_t hours = raw / 100;
    uint8_t minutes = raw - (hours * 100);
    return ESPTime {.minute = minutes, .hour = hours};
  func_time_to_int: "return x.hour * 100 + x.minute;"

datetime:
  - platform: template
    name: "Hackman Flex3L Time of Use 1 Start"
    id: hackman_flex3l_time_of_use_1_start
    type: time
    update_interval: 15s
    lambda: |-
      auto raw = id(hackman_flex3l_time_of_use_1_start_raw).state;
      ${func_int_to_time}
    set_action:
      - number.set:
          id: hackman_flex3l_time_of_use_1_start_raw
          value: !lambda ${func_time_to_int}

