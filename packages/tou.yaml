switch:
  - platform: template
    name: "Hackman Flex3L Time of Use"
    icon: "mdi:toggle-switch"
    optimistic: true
    restore_mode: DISABLED
    lambda: "return ((int)id(hackman_flex3l_time_of_use_enabled_raw).state & 0b00000001) != 0;"
    turn_on_action:
      - number.set:
          id: hackman_flex3l_time_of_use_enabled_raw
