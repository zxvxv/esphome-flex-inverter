# --- POCZĄTEK PLIKU GRID ---
# Wersja v1.00 - Inicjalizacja konfiguracji sieci (Grid) dla Hackman Flex3L.
# Plik zawiera sensory parametrów sieci, odczyty CT, statystyki poboru/oddawania energii oraz konfigurację standardów AC.

sensor:
  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Hackman Flex3L Grid L1 Power"
    register_type: holding
    address: 722
    unit_of_measurement: "W"
    device_class: power
    state_class: "measurement"
    accuracy_decimals: 0
    value_type: S_WORD
    icon: "mdi:transmission-tower"

  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Hackman Flex3L Grid L2 Power"
    register_type: holding
    address: 723
    unit_of_measurement: "W"
    device_class: power
    state_class: "measurement"
    accuracy_decimals: 0
    value_type: S_WORD
    icon: "mdi:transmission-tower"

  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Hackman Flex3L Grid L3 Power"
    register_type: holding
    address: 724
    unit_of_measurement: "W"
    device_class: power
    state_class: "measurement"
    accuracy_decimals: 0
    value_type: S_WORD
    icon: "mdi:transmission-tower"

  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Hackman Flex3L Grid Power"
    register_type: holding
    address: 725
    unit_of_measurement: "W"
    device_class: power
    state_class: "measurement"
    accuracy_decimals: 0
    value_type: S_WORD
    icon: "mdi:transmission-tower"

  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Hackman Flex3L Grid Frequency"
    register_type: holding
    address: 709
    unit_of_measurement: "Hz"
    device_class: frequency
    accuracy_decimals: 2
    filters:
      - multiply: 0.01
    value_type: U_WORD
    icon: "mdi:sine-wave"

  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Hackman Flex3L Grid L1 Voltage"
    id: hackman_flex3l_grid_voltage_l1
    register_type: holding
    address: 698
    unit_of_measurement: "V"
    device_class: voltage
    accuracy_decimals: 1
    filters:
      - multiply: 0.1
    value_type: U_WORD
    icon: "mdi:sine-wave"

  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Hackman Flex3L Grid L2 Voltage"
    id: hackman_flex3l_grid_voltage_l2
    register_type: holding
    address: 699
    unit_of_measurement: "V"
    device_class: voltage
    accuracy_decimals: 1
    filters:
      - multiply: 0.1
    value_type: U_WORD
    icon: "mdi:sine-wave"

  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Hackman Flex3L Grid L3 Voltage"
    id: hackman_flex3l_grid_voltage_l3
    register_type: holding
    address: 700
    unit_of_measurement: "V"
    device_class: voltage
    accuracy_decimals: 1
    filters:
      - multiply: 0.1
    value_type: U_WORD
    icon: "mdi:sine-wave"

  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Hackman Flex3L Grid Power Factor"
    register_type: holding
    address: 721
    unit_of_measurement: "%"
    device_class: power_factor
    accuracy_decimals: 1
    filters:
      - multiply: 0.001
    value_type: U_WORD
    icon: "mdi:transmission-tower"

  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Hackman Flex3L Daily Energy Bought"
    id: hackman_flex3l_daily_energy_bought
    register_type: holding
    address: 620
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: "total_increasing"
    accuracy_decimals: 1
    value_type: U_WORD
    filters:
      - multiply: 0.1
    icon: "mdi:transmission-tower-import"

  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Hackman Flex3L Daily Energy Sold"
    id: hackman_flex3l_daily_energy_sold
    register_type: holding
    address: 621
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: "total_increasing"
    accuracy_decimals: 1
    value_type: U_WORD
    filters:
      - multiply: 0.1
    icon: "mdi:transmission-tower-export"

  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Hackman Flex3L Total Energy Bought"
    id: hackman_flex3l_total_energy_bought
    register_type: holding
    address: 622
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: "total_increasing"
    accuracy_decimals: 1
    value_type: U_DWORD_R
    filters:
      - multiply: 0.1
    icon: "mdi:transmission-tower-import"

  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Hackman Flex3L Total Energy Sold"
    id: hackman_flex3l_total_energy_sold
    register_type: holding
    address: 624
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: "total_increasing"
    accuracy_decimals: 1
    value_type: U_DWORD_R
    filters:
      - multiply: 0.1
    icon: "mdi:transmission-tower-export"

  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Hackman Flex3L Internal CT L1 Power"
    register_type: holding
    address: 704
    unit_of_measurement: "W"
    device_class: power
    state_class: "measurement"
    accuracy_decimals: 0
    value_type: S_WORD
    icon: "mdi:transmission-tower"

  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Hackman Flex3L Internal CT L2 Power"
    register_type: holding
    address: 705
    unit_of_measurement: "W"
    device_class: power
    state_class: "measurement"
    accuracy_decimals: 0
    value_type: S_WORD
    icon: "mdi:transmission-tower"

  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Hackman Flex3L Internal CT L3 Power"
    register_type: holding
    address: 706
    unit_of_measurement: "W"
    device_class: power
    state_class: "measurement"
    accuracy_decimals: 0
    value_type: S_WORD
    icon: "mdi:transmission-tower"

  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Hackman Flex3L Internal CT Power"
    register_type: holding
    address: 707
    unit_of_measurement: "W"
    device_class: power
    state_class: "measurement"
    accuracy_decimals: 0
    value_type: S_WORD
    icon: "mdi:transmission-tower"

  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Hackman Flex3L External CT L1 Power"
    register_type: holding
    address: 716
    unit_of_measurement: "W"
    device_class: power
    state_class: "measurement"
    accuracy_decimals: 0
    value_type: S_WORD
    icon: "mdi:transmission-tower"

  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Hackman Flex3L External CT L2 Power"
    register_type: holding
    address: 717
    unit_of_measurement: "W"
    device_class: power
    state_class: "measurement"
    accuracy_decimals: 0
    value_type: S_WORD
    icon: "mdi:transmission-tower"

  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Hackman Flex3L External CT L3 Power"
    register_type: holding
    address: 718
    unit_of_measurement: "W"
    device_class: power
    state_class: "measurement"
    accuracy_decimals: 0
    value_type: S_WORD
    icon: "mdi:transmission-tower"

  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Hackman Flex3L External CT Power"
    register_type: holding
    address: 719
    unit_of_measurement: "W"
    device_class: power
    state_class: "measurement"
    accuracy_decimals: 0
    value_type: S_WORD
    icon: "mdi:transmission-tower"

  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Hackman Flex3L Internal CT L1 Current"
    id: hackman_flex3l_internal_ct_l1_current
    register_type: holding
    address: 710
