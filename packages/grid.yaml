  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Hackman Flex3L External CT L3 Current"
    id: hackman_flex3l_external_ct_l3_current
    register_type: holding
    address: 715
    unit_of_measurement: "A"
    device_class: current
    accuracy_decimals: 2
    filters:
      - multiply: 0.01
    value_type: S_WORD
    icon: "mdi:transmission-tower"

binary_sensor:
  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Hackman Flex3L AC Grid Relay"
    register_type: holding
    address: 652
    bitmask: 0x4
    device_class: power
    icon: "mdi:transmission-tower"

  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Hackman Flex3L CT L1 Self Test"
    register_type: holding
    address: 697
    bitmask: 0x01
    device_class: problem
    filters:
      - invert:
    entity_category: diagnostic
    icon: "mdi:check-circle"

  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Hackman Flex3L CT L2 Self Test"
    register_type: holding
    address: 697
    bitmask: 0x02
    device_class: problem
    filters:
      - invert:
    entity_category: diagnostic
    icon: "mdi:check-circle"

  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Hackman Flex3L CT L3 Self Test"
    register_type: holding
    address: 697
    bitmask: 0x04
    device_class: problem
    filters:
      - invert:
    entity_category: diagnostic
    icon: "mdi:check-circle"

select:
  - platform: modbus_controller
    use_write_multiple: true
    modbus_controller_id: ${modbus_controller_id}
    name: "Hackman Flex3L Grid Frequency"
    address: 283
    value_type: U_WORD
    entity_category: config
    icon: "mdi:sine-wave"
    optionsmap:
      "50 Hz": 0
      "60 Hz": 1

  - platform: modbus_controller
    use_write_multiple: true
    modbus_controller_id: ${modbus_controller_id}
    name: "Hackman Flex3L AC Couple"
    address: 334
    value_type: U_WORD
    entity_category: config
    icon: "mdi:power-plug"
    lambda: |-
      if (x != 0 && x != 1 && x != 2) {
        return std::string("Disabled");
      }
      return {};
    optionsmap:
      "Disabled": 0
      "On Grid Side": 1
      "On Load Side": 2

  - platform: modbus_controller
    use_write_multiple: true
    modbus_controller_id: ${modbus_controller_id}
    name: "Hackman Flex3L Grid Voltage"
    address: 238
    value_type: U_WORD
    entity_category: config
    icon: "mdi:transmission-tower"
    optionsmap:
      "LN:220VAC LL:380VAC": 0
      "LN:230VAC LL:398VAC": 1
      "LN:240VAC LL:415VAC": 2
      "LN:120VAC LL:208VAC": 3
      "LN:133VAC LL:220VAC": 4
      "LN:100VAC LL:173VAC": 5

  - platform: modbus_controller
    use_write_multiple: true
    modbus_controller_id: ${modbus_controller_id}
    name: "Hackman Flex3L Charging Signal"
    address: 240
    value_type: U_WORD
    entity_category: config
    icon: "mdi:battery-charging"
    optionsmap:
      "Normal": 0
      "Grid": 1
      "Generator": 2
      "Both": 3

switch:
  - platform: modbus_controller
    use_write_multiple: true
    modbus_controller_id: ${modbus_controller_id}
    name: "Hackman Flex3L Force Off Grid"
    id: hackman_flex3l_switch_off_grid
    register_type: holding
    address: 279
    bitmask: 1
    entity_category: config
    icon: "mdi:transmission-tower-off"
  - platform: modbus_controller
    use_write_multiple: true
    modbus_controller_id: ${modbus_controller_id}
    name: "Hackman Flex3L Generator Grid Side"
    register_type: holding
    address: 289
    entity_category: config
    icon: "mdi:generator-stationary"

  - platform: template
    name: "Hackman Flex3L Asymmetric Phase Feeding"
    id: hackman_flex3l_switch_asymmetric_phase_feeding
    icon: "mdi:transmission-tower"
    optimistic: true
    restore_mode: DISABLED
    entity_category: config
    lambda: "return ((int)id(hackman_flex3l_asymmetric_phase_feeding_raw).state) != 0;"
    turn_on_action:
      - number.set:
          id: hackman_flex3l_asymmetric_phase_feeding_raw
          value: 1
    turn_off_action:
      - number.set:
          id: hackman_flex3l_asymmetric_phase_feeding_raw
          value: 0

number:
  - platform: modbus_controller
    use_write_multiple: true
    modbus_controller_id: ${modbus_controller_id}
    name: "Hackman Flex3L Asymmetric Phase Feeding Raw"
    id: hackman_flex3l_asymmetric_phase_feeding_raw
    register_type: holding
    address: 337
    internal: true
# --- KONIEC PLIKU GRID ---
