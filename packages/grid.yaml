      - multiply: 0.01
    value_type: S_WORD
    icon: "mdi:transmission-tower"

  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Hackman Flex3L Internal CT L3 Current"
    id: hackman_flex3l_internal_ct_l3_current
    register_type: holding
    address: 712
    unit_of_measurement: "A"
    device_class: current
    accuracy_decimals: 2
    filters:
      - multiply: 0.01
    value_type: S_WORD
    icon: "mdi:transmission-tower"

  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Hackman Flex3L External CT L1 Current"
    id: hackman_flex3l_external_ct_l1_current
    register_type: holding
    address: 713
    unit_of_measurement: "A"
    device_class: current
    accuracy_decimals: 2
    filters:
      - multiply: 0.01
    value_type: S_WORD
    icon: "mdi:transmission-tower"

  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Hackman Flex3L External CT L2 Current"
    id: hackman_flex3l_external_ct_l2_current
    register_type: holding
    address: 714
    unit_of_measurement: "A"
    device_class: current
