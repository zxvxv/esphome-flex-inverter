substitutions:
  update_interval: 5s

esphome:
  name: "${name}"
  friendly_name: "${friendly_name}"
  comment: "Hackman Flex3L (adapted for ESP32) https://github.com/Lewa-Reka/esphome-deye-inverter"
  project:
    name: "hackman.flex3l-inverter"
    version: "1.00.0"

logger:
  level: WARN

api:
  encryption:
    key: ${api_key}
  on_client_disconnected:
    - delay: ${safe_mode_delay}
    - if:
        condition:
          not: api.connected
        then:
          - logger.log: "Lost connection to HomeAssistant API - Activating safe mode"
          - script.execute: set_safe_modbus_registers

  on_client_connected:
    - logger.log: "Connection to HomeAssistant API restored"

ota:
  - platform: esphome
    password: ${ota_password}

wifi:
  # Captive portal automatycznie zapisze domowe sieci w pamięci flash
  ap:
    ssid: "Hackman"
    # Otwarta sieć bez hasła, aby Captive Portal uruchomił się od razu po połączeniu

captive_portal:

uart:
  id: modbus_uart
  baud_rate: ${baud_rate}
  stop_bits: 1

modbus:
  id: modbus_1
  uart_id: modbus_uart

modbus_controller:
  - id: ${modbus_controller_id}
    address: ${modbus_inverter_address}
    modbus_id: modbus_1
    setup_priority: -10
    update_interval: ${update_interval}
    command_throttle: 60ms
    offline_skip_updates: 3
# --- KONIEC PLIKU GŁÓWNEGO ---
